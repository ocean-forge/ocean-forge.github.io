<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Forge</title>
  <style>
    @font-face {
      font-family: 'Dune Rise';
      src: url('fonts/Dune_Rise.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1628;
      color: #e8f4f8;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    img.logo {
      width: 180px;
      margin-bottom: 2rem;
      opacity: 0.95;
    }
    h1 {
      font-family: 'Dune Rise', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      color: #7ab8cc;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <img class="logo" src="logo_ocean_forge.png" alt="Ocean Forge">
  <h1>Ocean Forge</h1>
  <p>Open-source oceanographic instruments — coming soon.</p>
</body>
</html>
